<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTG Price Checker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eaeaea;
    --text-muted: #9a9ab0;
    --border: #2a2a4a;
    --green: #4caf50;
    --red: #f44336;
    --row-alt: #1e1e38;
    --row-hover: #252545;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--surface2), var(--accent2));
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 2px solid var(--accent);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--accent); }
  .ck-badge {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: rgba(0,0,0,0.3);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .ck-badge.ready { color: var(--green); border-color: var(--green); }

  /* ── Main layout ─────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 16px;
    gap: 16px;
  }

  .panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--surface2);
    padding: 8px 12px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }
  .panel-body { padding: 12px; }

  /* Deck input */
  .url-row { display: flex; gap: 6px; margin-bottom: 8px; }
  input[type="text"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); }
  input[type="text"] { flex: 1; min-width: 0; }
  textarea { width: 100%; resize: vertical; min-height: 140px; font-family: monospace; font-size: 0.8rem; line-height: 1.5; }

  .btn {
    padding: 7px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.83rem;
    font-weight: 600;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 0.77rem; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  /* Settings */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.83rem;
    border-bottom: 1px solid var(--border);
  }
  .setting-row:last-child { border-bottom: none; }
  label { cursor: pointer; user-select: none; }

  select { padding: 5px 8px; }

  /* Source toggles */
  .source-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .source-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .source-toggle:hover { background: var(--accent2); }
  .source-toggle input[type=checkbox] { accent-color: var(--accent); }

  /* Missing cards */
  #missing-list {
    list-style: none;
    max-height: 120px;
    overflow-y: auto;
    font-size: 0.8rem;
    color: var(--red);
  }
  #missing-list li { padding: 3px 4px; border-bottom: 1px solid var(--border); }
  #missing-list li:last-child { border-bottom: none; }

  /* ── Content area ────────────────────────────────────── */
  .content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Status bar */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .progress-wrap { flex: 1; }
  progress {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    appearance: none;
    overflow: hidden;
    background: var(--border);
  }
  progress::-webkit-progress-bar { background: var(--border); border-radius: 3px; }
  progress::-webkit-progress-value { background: var(--accent); border-radius: 3px; }
  #status-text { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .total-chip {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--green);
    background: rgba(76,175,80,0.12);
    border: 1px solid var(--green);
    padding: 4px 14px;
    border-radius: 20px;
  }

  /* Table */
  .table-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    table-layout: fixed;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  thead th {
    background: var(--surface2);
    padding: 9px 8px;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    border-bottom: 2px solid var(--accent);
    font-weight: 600;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    user-select: none;
  }
  thead th:hover { background: var(--accent2); }
  thead th.sorted-asc::after { content: ' ▲'; font-size: 0.65rem; }
  thead th.sorted-desc::after { content: ' ▼'; font-size: 0.65rem; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.selected { background: #2a2a5a !important; outline: 1px solid var(--accent); }

  td {
    padding: 7px 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 0;
  }
  td.card-name { font-weight: 500; color: #c8d8ff; }
  td.price { text-align: right; font-variant-numeric: tabular-nums; font-family: monospace; font-size: 0.83rem; }
  td.cheapest { color: var(--green); font-weight: 700; text-align: right; }
  td.ck-col { text-align: center; }
  td.missing { color: var(--text-muted); font-size: 0.75rem; }

  /* CK% colour coding via inline style */

  /* Column widths */
  col.col-card { width: 170px; }
  col.col-price { width: 88px; }
  col.col-cheapest { width: 90px; }
  col.col-ck { width: 70px; }

  /* Loading skeleton row */
  .skeleton td { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* Context menu */
  #ctx-menu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 1000;
    min-width: 180px;
    display: none;
  }
  #ctx-menu.open { display: block; }
  #ctx-menu ul { list-style: none; padding: 4px 0; }
  #ctx-menu li {
    padding: 8px 14px;
    font-size: 0.83rem;
    cursor: pointer;
    transition: background 0.1s;
  }
  #ctx-menu li:hover { background: var(--accent2); }
  #ctx-menu li.divider { border-top: 1px solid var(--border); margin: 3px 0; padding: 0; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.85rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="13" stroke="#e94560" stroke-width="2"/>
    <path d="M9 20 L14 8 L19 20 M11 16 H17" stroke="#eaeaea" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  <h1>MTG <span>Price</span> Checker</h1>
  <div id="ck-badge" class="ck-badge">CK Loading…</div>
</header>

<main>
  <!-- ── Sidebar ───────────────────────────────── -->
  <aside>

    <!-- Deck Input -->
    <div class="panel">
      <div class="panel-header">Deck Input</div>
      <div class="panel-body">
        <div class="url-row">
          <input type="text" id="url-input" placeholder="Paste deck URL…" />
          <button class="btn btn-secondary btn-sm" id="btn-fetch-url">Fetch</button>
        </div>
        <textarea id="deck-input" placeholder="Or paste your decklist here&#10;&#10;e.g.&#10;4 Lightning Bolt&#10;2 Counterspell"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-search" style="flex:1">▶ Search Prices</button>
          <button class="btn btn-danger btn-sm" id="btn-stop" style="display:none">■ Stop</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary btn-sm" id="btn-open-all">⬡ Open All Cheapest</button>
          <button class="btn btn-success btn-sm" id="btn-export">⬇ Export CSV</button>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="panel">
      <div class="panel-header">Settings</div>
      <div class="panel-body">
        <div class="setting-row">
          <label for="hareruya-lang">Hareruya Language</label>
          <select id="hareruya-lang">
            <option value="EN">EN</option>
            <option value="EN>JP">EN→JP</option>
            <option value="JP">JP</option>
            <option value="Other">Other</option>
            <option value="All">All</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="cb-sideboard">Include Sideboard</label>
          <input type="checkbox" id="cb-sideboard" />
        </div>
        <div class="setting-row">
          <label for="cb-maybeboard">Include Maybeboard</label>
          <input type="checkbox" id="cb-maybeboard" />
        </div>
      </div>
    </div>

    <!-- Source Toggles -->
    <div class="panel">
      <div class="panel-header">Sources
        <span style="float:right;font-weight:400;cursor:pointer;font-size:0.75rem" id="toggle-all-sources">Toggle All</span>
      </div>
      <div class="panel-body">
        <div class="source-grid" id="source-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Missing Cards -->
    <div class="panel">
      <div class="panel-header">Missing / Out of Stock</div>
      <div class="panel-body" style="padding:8px">
        <ul id="missing-list"></ul>
      </div>
    </div>

  </aside>

  <!-- ── Content ───────────────────────────────── -->
  <div class="content">
    <div class="statusbar">
      <div class="progress-wrap">
        <progress id="progress-bar" value="0" max="100"></progress>
        <div id="status-text">Ready — paste a decklist and click Search</div>
      </div>
      <div class="total-chip" id="total-label">AU $0.00</div>
    </div>

    <div class="table-wrap">
      <table id="results-table">
        <colgroup id="colgroup"></colgroup>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Context menu -->
<div id="ctx-menu">
  <ul id="ctx-list"></ul>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────
let SOURCES = [];
let enabledSources = new Set();
let rows = [];          // [{card, results, cheapest_price, cheapest_url, ck_usd, ck_ratio}]
let sortCol = null;
let sortAsc = true;
let selectedIdx = null;
let abortCtrl = null;
let lastClickIdx = null;

// ── Init ─────────────────────────────────────────────────
async function init() {
  const res = await fetch('/sources');
  SOURCES = await res.json();
  enabledSources = new Set(SOURCES);

  // Build source toggles
  const grid = document.getElementById('source-grid');
  SOURCES.forEach(s => {
    const lbl = document.createElement('label');
    lbl.className = 'source-toggle';
    lbl.innerHTML = `<input type="checkbox" checked data-src="${s}" /> ${s}`;
    lbl.querySelector('input').addEventListener('change', () => {
      if (lbl.querySelector('input').checked) enabledSources.add(s);
      else enabledSources.delete(s);
      recalcCheapest();
    });
    grid.appendChild(lbl);
  });

  // Build table headers
  buildTableHeaders();

  // Poll CK status
  pollCKStatus();
}

function buildTableHeaders() {
  const tr = document.getElementById('thead-row');
  const cg = document.getElementById('colgroup');
  tr.innerHTML = '';
  cg.innerHTML = '';

  const cols = ['Card', ...SOURCES, 'Cheapest', 'CK%'];
  cols.forEach((c, i) => {
    const th = document.createElement('th');
    th.textContent = c;
    th.dataset.col = c;
    th.addEventListener('click', () => sortBy(c));
    tr.appendChild(th);

    const col = document.createElement('col');
    col.className = c === 'Card' ? 'col-card' : c === 'Cheapest' ? 'col-cheapest' : c === 'CK%' ? 'col-ck' : 'col-price';
    cg.appendChild(col);
  });
}

async function pollCKStatus() {
  const badge = document.getElementById('ck-badge');
  const check = async () => {
    try {
      const r = await fetch('/ck-status');
      const d = await r.json();
      if (d.ready) {
        badge.textContent = `CK: ${d.count.toLocaleString()} cards`;
        badge.classList.add('ready');
      } else {
        badge.textContent = 'CK Loading…';
        setTimeout(check, 2000);
      }
    } catch { setTimeout(check, 3000); }
  };
  check();
}

// ── Search ───────────────────────────────────────────────
document.getElementById('btn-search').addEventListener('click', startSearch);
document.getElementById('btn-stop').addEventListener('click', stopSearch);

async function startSearch() {
  const text = document.getElementById('deck-input').value.trim();
  if (!text) { toast('Paste a decklist first'); return; }

  const cards = parseDecklist(text);
  if (!cards.length) { toast('No cards found in input'); return; }

  rows = [];
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('missing-list').innerHTML = '';
  document.getElementById('total-label').textContent = 'AU $0.00';
  document.getElementById('progress-bar').value = 0;
  document.getElementById('progress-bar').max = 100;

  document.getElementById('btn-search').style.display = 'none';
  document.getElementById('btn-stop').style.display = '';

  abortCtrl = new AbortController();

  const body = {
    cards,
    enabled_sources: [...enabledSources],
    hareruya_lang: document.getElementById('hareruya-lang').value,
  };

  try {
    const res = await fetch('/search/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
      signal: abortCtrl.signal,
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          handleSSE(JSON.parse(line.slice(6)));
        }
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }

  document.getElementById('btn-search').style.display = '';
  document.getElementById('btn-stop').style.display = 'none';
  setStatus('Done ✓');
}

function stopSearch() {
  if (abortCtrl) abortCtrl.abort();
  document.getElementById('btn-search').style.display = '';
  document.getElementById('btn-stop').style.display = 'none';
  setStatus('Stopped.');
}

function handleSSE(msg) {
  if (msg.type === 'start') {
    document.getElementById('progress-bar').max = msg.total;
    setStatus(`Searching 0 / ${msg.total}…`);
  } else if (msg.type === 'result') {
    rows.push(msg);
    appendRow(msg);
    document.getElementById('progress-bar').value = msg.index;
    setStatus(`Searching ${msg.index} / ${document.getElementById('progress-bar').max}…`);
    updateTotal();
    updateMissing();
  } else if (msg.type === 'done') {
    setStatus(`Done — ${rows.length} cards`);
    document.getElementById('progress-bar').value = document.getElementById('progress-bar').max;
  }
}

// ── Table rendering ──────────────────────────────────────
function appendRow(data) {
  const tr = document.createElement('tr');
  tr.dataset.idx = rows.length - 1;
  renderRowCells(tr, data);
  applyRowColour(tr, data.ck_ratio);
  tr.addEventListener('click', onRowClick);
  tr.addEventListener('contextmenu', onRowRightClick);
  document.getElementById('tbody').appendChild(tr);
}

function renderRowCells(tr, data) {
  tr.innerHTML = '';
  // Card name
  const tdCard = document.createElement('td');
  tdCard.className = 'card-name';
  tdCard.textContent = data.card;
  tdCard.title = data.card;
  tr.appendChild(tdCard);

  // Per-source prices
  SOURCES.forEach(s => {
    const td = document.createElement('td');
    td.className = 'price';
    if (!enabledSources.has(s)) {
      td.textContent = '–';
      td.style.color = 'var(--border)';
      tr.appendChild(td); return;
    }
    const r = data.results?.[s];
    const price = r?.price || 0;
    if (price > 0) {
      td.textContent = s === 'Hareruya' && r?.jpy
        ? `$${price.toFixed(2)} (¥${r.jpy})`
        : `$${price.toFixed(2)}`;
      if (price === data.cheapest_price) {
        td.style.color = 'var(--green)';
        td.style.fontWeight = '700';
      }
    } else {
      td.textContent = '–';
      td.style.color = 'var(--text-muted)';
    }
    tr.appendChild(td);
  });

  // Cheapest
  const tdC = document.createElement('td');
  tdC.className = 'cheapest';
  tdC.textContent = data.cheapest_price > 0 ? `$${data.cheapest_price.toFixed(2)}` : '–';
  tr.appendChild(tdC);

  // CK%
  const tdCK = document.createElement('td');
  tdCK.className = 'ck-col';
  if (data.ck_ratio != null) {
    tdCK.textContent = `${Math.round(data.ck_ratio * 100)}%`;
  } else {
    tdCK.textContent = '–';
    tdCK.style.color = 'var(--text-muted)';
  }
  tr.appendChild(tdCK);
}

function applyRowColour(tr, ratio) {
  if (ratio == null) return;
  const clamped = Math.max(0.25, Math.min(2.5, ratio));
  let r, g, b;
  if (ratio >= 1.0) {
    const intensity = Math.min(1.0, (clamped - 1.0) / 1.5);
    r = Math.round(255 - intensity * 120);
    g = 255;
    b = Math.round(255 - intensity * 120);
  } else {
    const intensity = Math.min(1.0, (1.0 - clamped) / 0.75);
    r = 255;
    g = Math.round(255 - intensity * 120);
    b = Math.round(255 - intensity * 120);
  }
  // Blend with dark background for readability
  const mix = (c) => Math.round(c * 0.22 + 26 * 0.78);
  tr.style.setProperty('--row-base', `rgb(${mix(r)},${mix(g)},${mix(b)})`);
  tr.style.background = `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function recalcCheapest() {
  let total = 0;
  rows.forEach((data, i) => {
    // Recalc cheapest over enabled sources only
    let cheapest = Infinity;
    let cheapSource = '';
    let cheapUrl = '';
    SOURCES.forEach(s => {
      if (!enabledSources.has(s)) return;
      const p = data.results?.[s]?.price || 0;
      if (p > 0 && p < cheapest) { cheapest = p; cheapSource = s; cheapUrl = data.results[s].url; }
    });
    if (cheapest === Infinity) cheapest = 0;
    data.cheapest_price = cheapest;
    data.cheapest_url = cheapUrl;
    if (data.ck_usd && cheapest > 0) data.ck_ratio = data.ck_usd / cheapest;
    else data.ck_ratio = null;

    const tr = document.querySelector(`#tbody tr[data-idx="${i}"]`);
    if (tr) { renderRowCells(tr, data); applyRowColour(tr, data.ck_ratio); }
    total += cheapest;
  });
  document.getElementById('total-label').textContent = `AU $${total.toFixed(2)}`;
  updateMissing();
}

function updateTotal() {
  const total = rows.reduce((a, r) => a + (r.cheapest_price || 0), 0);
  document.getElementById('total-label').textContent = `AU $${total.toFixed(2)}`;
}

function updateMissing() {
  const ul = document.getElementById('missing-list');
  ul.innerHTML = '';
  [...new Set(rows.filter(r => !r.cheapest_price || r.cheapest_price === 0).map(r => r.card))].sort().forEach(c => {
    const li = document.createElement('li'); li.textContent = c; ul.appendChild(li);
  });
}

// ── Row interaction ──────────────────────────────────────
function onRowClick(e) {
  const idx = +e.currentTarget.dataset.idx;
  document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('selected'));
  e.currentTarget.classList.add('selected');

  if (lastClickIdx === idx) {
    // Double-click style: open cheapest
    const url = rows[idx]?.cheapest_url;
    if (url) window.open(url, '_blank');
    lastClickIdx = null;
  } else {
    lastClickIdx = idx;
    selectedIdx = idx;
    setTimeout(() => { if (lastClickIdx === idx) lastClickIdx = null; }, 500);
  }
}

function onRowRightClick(e) {
  e.preventDefault();
  const idx = +e.currentTarget.dataset.idx;
  selectedIdx = idx;
  showContextMenu(e.clientX, e.clientY, idx);
}

function showContextMenu(x, y, idx) {
  const menu = document.getElementById('ctx-menu');
  const ul = document.getElementById('ctx-list');
  ul.innerHTML = '';

  const data = rows[idx];
  // Open cheapest
  const liC = document.createElement('li');
  liC.textContent = `⬡ Open Cheapest ($${(data?.cheapest_price||0).toFixed(2)})`;
  liC.addEventListener('click', () => { if (data?.cheapest_url) window.open(data.cheapest_url,'_blank'); hideCtx(); });
  ul.appendChild(liC);

  const div = document.createElement('li'); div.className='divider'; ul.appendChild(div);

  SOURCES.forEach(s => {
    const url = data?.results?.[s]?.url;
    const price = data?.results?.[s]?.price || 0;
    if (!url || !price) return;
    const li = document.createElement('li');
    li.textContent = `${s}  $${price.toFixed(2)}`;
    li.addEventListener('click', () => { window.open(url,'_blank'); hideCtx(); });
    ul.appendChild(li);
  });

  menu.style.left = `${Math.min(x, window.innerWidth-200)}px`;
  menu.style.top  = `${Math.min(y, window.innerHeight-300)}px`;
  menu.classList.add('open');
}

function hideCtx() { document.getElementById('ctx-menu').classList.remove('open'); }
document.addEventListener('click', hideCtx);

// ── Open All ─────────────────────────────────────────────
document.getElementById('btn-open-all').addEventListener('click', () => {
  let n = 0;
  rows.forEach(r => { if (r.cheapest_url) { window.open(r.cheapest_url,'_blank'); n++; } });
  toast(`Opened ${n} tabs`);
});

// ── Export CSV ───────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  if (!rows.length) { toast('No data to export'); return; }
  const headers = ['Card', ...SOURCES, 'Cheapest (AUD)', 'CK USD', 'CK Ratio', 'Cheapest URL'];
  const csvRows = [headers.join(',')];
  rows.forEach(r => {
    const prices = SOURCES.map(s => r.results?.[s]?.price > 0 ? r.results[s].price.toFixed(2) : '');
    const row = [
      `"${r.card}"`,
      ...prices,
      r.cheapest_price > 0 ? r.cheapest_price.toFixed(2) : '',
      r.ck_usd != null ? r.ck_usd.toFixed(2) : '',
      r.ck_ratio != null ? r.ck_ratio.toFixed(4) : '',
      `"${r.cheapest_url || ''}"`,
    ];
    csvRows.push(row.join(','));
  });
  const blob = new Blob([csvRows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mtg_prices_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});

// ── Sort ─────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }

  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (th.dataset.col === col) th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
  });

  rows.sort((a, b) => {
    let va, vb;
    if (col === 'Card') { va = a.card; vb = b.card; }
    else if (col === 'Cheapest') { va = a.cheapest_price||0; vb = b.cheapest_price||0; }
    else if (col === 'CK%') { va = a.ck_ratio||0; vb = b.ck_ratio||0; }
    else { va = a.results?.[col]?.price||0; vb = b.results?.[col]?.price||0; }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach((data, i) => {
    data._idx = i;
    const tr = document.createElement('tr');
    tr.dataset.idx = i;
    renderRowCells(tr, data);
    applyRowColour(tr, data.ck_ratio);
    tr.addEventListener('click', onRowClick);
    tr.addEventListener('contextmenu', onRowRightClick);
    tbody.appendChild(tr);
  });
}

// ── Deck URL fetch ───────────────────────────────────────
document.getElementById('btn-fetch-url').addEventListener('click', async () => {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  setStatus('Fetching deck…');
  try {
    const sb = document.getElementById('cb-sideboard').checked;
    const mb = document.getElementById('cb-maybeboard').checked;
    const res = await fetch(`/fetch-deck?url=${encodeURIComponent(url)}&include_sideboard=${sb}&include_maybeboard=${mb}`);
    const data = await res.json();
    if (data.error) { toast('Error: ' + data.error); return; }
    const text = data.cards.map(c => `${c.qty} ${c.name}`).join('\n');
    document.getElementById('deck-input').value = text;
    setStatus(`Loaded ${data.cards.length} cards`);
  } catch (e) { toast('Failed to fetch deck: ' + e.message); }
});

// ── Toggle all sources ───────────────────────────────────
document.getElementById('toggle-all-sources').addEventListener('click', () => {
  const allOn = SOURCES.every(s => enabledSources.has(s));
  document.querySelectorAll('#source-grid input[type=checkbox]').forEach(cb => {
    cb.checked = !allOn;
    const s = cb.dataset.src;
    if (!allOn) enabledSources.add(s); else enabledSources.delete(s);
  });
  recalcCheapest();
});

// ── Helpers ──────────────────────────────────────────────
function parseDecklist(text) {
  return text.split('\n')
    .map(l => l.trim())
    .filter(Boolean)
    .map(l => l.replace(/^\d+x?\s*/, '').trim())
    .filter(Boolean);
}

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
